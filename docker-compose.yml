# Optional: run the API in Docker (good for a small VPS). Data persists in ./data on the host.
# Copy .env.example to .env and set ACTIVITY_API_KEY before the first run.
# Then: docker compose up -d --build
services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ACTIVITY_HOST: "0.0.0.0"
    volumes:
      - ./data:/app/data
